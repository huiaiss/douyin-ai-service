<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; background: #1a1a2e; color: #e0e0e0;
           font-family: "PingFang SC", "Microsoft YaHei", sans-serif; padding: 16px; }
    h3 { color: #a0b4ff; font-size: 15px; margin-bottom: 12px; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.online { background: #4caf50; }
    .dot.offline { background: #f44336; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px;
           cursor: pointer; font-size: 13px; margin-top: 8px; }
    .btn-primary { background: #3a3a6e; color: #a0b4ff; }
    .btn-secondary { background: transparent; border: 1px solid rgba(100,130,255,0.2); color: #888; }
    hr { border-color: rgba(100,130,255,0.1); margin: 12px 0; }
  </style>
</head>
<body>
  <h3>抖音 AI 客服助手</h3>
  <div class="status">
    <div class="dot online" id="status_dot"></div>
    <span id="status_text">已连接</span>
  </div>
  <button class="btn btn-primary" id="btn_settings">打开管理后台</button>
  <button class="btn btn-secondary" id="btn_mode">模式：建议模式</button>
  <hr />
  <div style="font-size:11px;color:#666;text-align:center;">
    不会自动发送消息 · 你永远掌控
  </div>
  <script src="popup.js"></script>
</body>
</html>
