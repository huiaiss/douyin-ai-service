{% extends "base.html" %}
{% block title %}知识库 - 抖音 AI 客服{% endblock %}
{% block content %}
<h1>知识库管理</h1>
<button class="btn btn-primary" onclick="openForm()">+ 新增知识</button>
<table class="table">
  <thead>
    <tr><th>分类</th><th>标题</th><th>内容</th><th>操作</th></tr>
  </thead>
  <tbody>
    {% for k in items %}
    <tr>
      <td>{{ k.category }}</td>
      <td>{{ k.title }}</td>
      <td>{{ k.content[:60] }}{% if k.content|length > 60 %}...{% endif %}</td>
      <td>
        <button class="btn btn-sm" onclick="editItem({{ k.id }})">编辑</button>
        <button class="btn btn-sm btn-danger" onclick="deleteItem({{ k.id }})">删除</button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<div id="formModal" class="modal" style="display:none">
  <div class="modal-content">
    <h3 id="formTitle">新增知识</h3>
    <input id="kTitle" placeholder="标题" class="input" />
    <select id="kCategory" class="input">
      <option value="物流">物流</option>
      <option value="售后">售后</option>
      <option value="商品">商品</option>
      <option value="其他">其他</option>
    </select>
    <textarea id="kContent" placeholder="内容" class="input" rows="4"></textarea>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveItem()">保存</button>
      <button class="btn btn-secondary" onclick="closeForm()">取消</button>
    </div>
  </div>
</div>

<script>
let editingId = null;
function openForm(id) {
  editingId = id || null;
  document.getElementById("formTitle").textContent = id ? "编辑知识" : "新增知识";
  document.getElementById("formModal").style.display = "flex";
  if (id) {
    fetch("/api/knowledge/" + id).then(r => r.json()).then(d => {
      document.getElementById("kTitle").value = d.title;
      document.getElementById("kCategory").value = d.category;
      document.getElementById("kContent").value = d.content;
    });
  }
}
function closeForm() {
  document.getElementById("formModal").style.display = "none";
  document.getElementById("kTitle").value = "";
  document.getElementById("kContent").value = "";
  editingId = null;
}
function saveItem() {
  const body = {
    title: document.getElementById("kTitle").value,
    category: document.getElementById("kCategory").value,
    content: document.getElementById("kContent").value,
  };
  const method = editingId ? "PUT" : "POST";
  const url = editingId ? "/api/knowledge/" + editingId : "/api/knowledge";
  fetch(url, {method, headers: {"Content-Type":"application/json"}, body: JSON.stringify(body)})
    .then(r => { if (r.ok) location.reload(); });
}
function deleteItem(id) {
  if (confirm("确认删除？")) {
    fetch("/api/knowledge/" + id, {method:"DELETE"}).then(r => { if (r.ok) location.reload(); });
  }
}
</script>
{% endblock %}
